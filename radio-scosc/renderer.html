<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1a2e;
    color: #eee;
    padding: 24px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 16px;
}
h1 { font-size: 1.1em; color: #aaa; font-weight: normal; }
#join-wrap {
    display: flex;
    gap: 8px;
}
#room-input {
    flex: 1;
    padding: 8px;
    border-radius: 4px;
    border: 1px solid #444;
    background: #111;
    color: #eee;
    font-size: 1em;
}
#rate-select {
    padding: 8px;
    border-radius: 4px;
    border: 1px solid #444;
    background: #111;
    color: #eee;
    font-size: 1em;
}
#join-btn {
    padding: 8px 16px;
    border-radius: 4px;
    border: none;
    background: #4caf50;
    color: #fff;
    cursor: pointer;
    font-size: 1em;
}
#join-btn:disabled {
    background: #444;
    cursor: default;
}
#status-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 1em;
}
#dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s;
}
#dot.connected    { background: #4caf50; }
#dot.disconnected { background: #f44336; }
#dot.connecting   { background: #ff9800; }
#dot.error        { background: #9c27b0; }
#log {
    flex: 1;
    font-size: 0.8em;
    color: #888;
    background: #111;
    padding: 10px;
    border-radius: 6px;
    overflow-y: auto;
    line-height: 1.6;
}
</style>
</head>
<body>
<h1>Radio SCOSC Listener</h1>
<div id="join-wrap">
    <input id="room-input" type="text" placeholder="Room name" />
    <select id="rate-select">
        <option value="44100">44100 Hz</option>
        <option value="48000" selected>48000 Hz</option>
        <option value="96000">96000 Hz</option>
    </select>
    <button id="join-btn">Join</button>
</div>
<div id="status-wrap">
    <div id="dot"></div>
    <span id="status-text">Enter a room name to join.</span>
</div>
<div id="log"></div>
<script src="renderer.js"></script>
</body>
</html>
